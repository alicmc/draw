<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <title>Pigment Draw</title>
  </head>

  <body>
    <main class="app" aria-label="Pigment drawing studio">
      <aside class="panel" aria-label="Drawing controls">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Pigment Draw</h1>
            <p id="status" aria-live="polite">Black selected</p>
          </div>
        </div>

        <section class="tool-group" aria-label="Brush settings">
          <label for="brush-size">
            <span>Brush</span>
            <output id="brush-output" for="brush-size">80</output>
          </label>
          <input id="brush-size" type="range" min="12" max="160" value="80">

          <label for="blend-strength">
            <span>Blend</span>
            <output id="blend-output" for="blend-strength">65%</output>
          </label>
          <input id="blend-strength" type="range" min="0" max="100" value="65">
        </section>

        <section class="tool-group" aria-label="Actions">
          <div class="actions">
            <button id="undo-button" class="icon-button" type="button" aria-label="Undo last stroke" title="Undo">
              <span aria-hidden="true">↶</span>
            </button>
            <button id="clear-button" class="icon-button" type="button" aria-label="Clear canvas" title="Clear">
              <span aria-hidden="true">×</span>
            </button>
            <button id="save-button" class="icon-button" type="button" aria-label="Download drawing" title="Download">
              <span aria-hidden="true">↓</span>
            </button>
          </div>
        </section>

        <section class="tool-group palette-wrap" aria-label="Pigment palette">
          <div id="palette" class="palette"></div>
        </section>
      </aside>

      <section class="stage" aria-label="Drawing canvas">
        <div id="canvas-shell" class="canvas-shell"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.1/lib/p5.js"></script>
    <script src="https://scrtwpns.com/mixbox.js"></script>
    <script src="draw.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
    <title>Meme Mixer</title>
  </head>

  <body>
    <main class="app" aria-label="Pigment color matching game">
      <aside class="panel" aria-label="Game controls">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Meme Mixer</h1>
            <p id="status" aria-live="polite">Mix the target color</p>
          </div>
        </div>

        <section class="match-board" aria-label="Target and current color">
          <div class="color-card">
            <span>Target</span>
            <div id="target-chip" class="color-chip"></div>
          </div>
          <div class="color-card">
            <span>Your mix</span>
            <div id="mix-chip" class="color-chip"></div>
          </div>
        </section>

        <section class="score-board" aria-label="Score">
          <div>
            <span>Last score</span>
            <strong id="score-value">--</strong>
          </div>
          <div>
            <span>Best</span>
            <strong id="best-value">--</strong>
          </div>
        </section>

        <section class="tool-group" aria-label="Game actions">
          <div class="actions">
            <button id="check-button" class="text-button primary" type="button">
              Check
            </button>
            <button id="undo-button" class="text-button" type="button">
              Undo
            </button>
            <button id="reset-button" class="text-button" type="button">
              Reset
            </button>
            <button id="next-button" class="text-button" type="button">
              Next
            </button>
          </div>
        </section>

        <section class="tool-group palette-wrap" aria-label="Pigment palette">
          <div id="palette" class="palette"></div>
        </section>
      </aside>

      <section class="stage" aria-label="Meme prompt and pigment mixing canvas">
        <section class="meme-card stage-meme" aria-label="Meme prompt">
          <img id="meme-image" alt="" />
          <a
            id="meme-link"
            class="visually-hidden"
            href="#"
            target="_blank"
            rel="noreferrer"
            >Open source</a
          >
        </section>
        <div id="canvas-shell" class="canvas-shell"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.1/lib/p5.js"></script>
    <script src="https://scrtwpns.com/mixbox.js"></script>
    <script src="draw.js"></script>
  </body>
</html>
